<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Absen GPS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
            padding-top: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 5px;
        }

        button {
            width: 95%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:active {
            background: darkgreen;
        }

        #status {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Absen GPS</h2>

    <input type="text" id="nama" placeholder="Nama"><br>
    <input type="text" id="kelas" placeholder="Kelas"><br>

    <select id="waktuAbsen">
        <option value="">Pilih Waktu</option>
        <option value="Pagi">Pagi</option>
        <option value="Siang">Siang</option>
        <option value="Malam">Malam</option>
    </select><br>

    <p id="status">Klik tombol untuk absen</p>

    <button onclick="kirimWA()">Absen Sekarang</button>
</div>

<script>
function kirimWA() {

    var nama = document.getElementById("nama").value;
    var kelas = document.getElementById("kelas").value;
    var waktuAbsen = document.getElementById("waktuAbsen").value;

    if (nama == "" || kelas == "" || waktuAbsen == "") {
        alert("Isi semua data!");
        return;
    }

    if (!navigator.geolocation) {
        alert("HP tidak support GPS");
        return;
    }

    document.getElementById("status").innerHTML = "Mengambil lokasi...";

    navigator.geolocation.getCurrentPosition(function(pos) {

        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;

        var maps = "https://maps.google.com/?q=" + lat + "," + lon;
        var waktu = new Date().toLocaleString();

        var pesan = "ABSEN GPS\n\n" +
                    "Nama: " + nama + "\n" +
                    "Kelas: " + kelas + "\n" +
                    "Absen: " + waktuAbsen + "\n" +
                    "Waktu: " + waktu + "\n" +
                    "Lokasi: " + maps + "\n" +
                    "Status: Hadir";

        var nomor = "6283136242383"; // GANTI NOMOR KAMU

        var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

        window.location.href = url;

    }, function(error) {
        alert("Aktifkan GPS dulu!");
    });
}
</script>

</body>
</html>
