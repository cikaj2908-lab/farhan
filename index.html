<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Absen Online</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Form Absen</h2>

    <input type="text" id="nama" placeholder="Nama"><br>
    <input type="text" id="kelas" placeholder="Kelas"><br>

    <button onclick="kirimWA()">Absen Sekarang</button>
</div>

<script>
function kirimWA() {
    var nama = document.getElementById("nama").value;
    var kelas = document.getElementById("kelas").value;

    if(nama === "" || kelas === "") {
        alert("Isi dulu semua data!");
        return;
    }

    var nomor = "6283136242383"; // GANTI nomor tujuan

    var waktu = new Date().toLocaleString();

    var pesan = "📌 ABSEN ONLINE%0A%0A" +
                "Nama: " + nama + "%0A" +
                "Kelas: " + kelas + "%0A" +
                "Waktu: " + waktu + "%0A" +
                "Status: Hadir";

    var url = "https://wa.me/" + nomor + "?text=" + pesan;

    window.open(url, "_blank");
}
</script>

</body>
</html>
