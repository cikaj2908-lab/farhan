<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSEN SAYANG💖</title>

<style>
body {
    font-family: Arial;
    background: #ffd6e0;
    padding: 15px;
}
.container {
    max-width: 400px;
    margin: auto;
}
h2 {
    text-align: center;
    color: #ff4d88;
}
.box {
    background: #fff0f5;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
select, input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ff99bb;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #ff4d88;
    color: white;
    font-size: 16px;
}
button:hover {
    background: #ff1a66;
}
#lokasi {
    text-align: center;
    color: #ff4d88;
}
</style>
</head>

<body>

<div class="container">
<h2>ABSEN SAYANG💖</h2>

<div class="box">
NAMA:
<input type="text" id="nama">
</div>

<div class="box">
ABSEN:
<select id="absen">
<option>PAGI</option>
<option>SIANG</option>
<option>MALEM</option>
</select>
</div>

<div class="box">
MAKAN:
<select id="makan">
<option>NASI</option>
<option>MIE</option>
<option>AYAM</option>
<option>ROTI</option>
<option>TIDAK MAKAN</option>
</select>
</div>

<div class="box">
MANDI:
<select id="MANDI">
<option>SUDAH</option>
<option>BELOM</option>
</select>
</div>

<div class="box">
ALASAN KELUAR:
<input type="text" id="alasan">
</div>

<button onclick="getLocation()">📍 AMBIL GPS</button>
<p id="lokasi">BELOM AMBIL GPS</p>

<button onclick="kirimWA()">💌 KIRIM</button>

</div>

<script>
let latitude = "";
let longitude = "";

function getLocation() {
    navigator.geolocation.getCurrentPosition(function(pos) {
        latitude = pos.coords.latitude;
        longitude = pos.coords.longitude;
        document.getElementById("lokasi").innerHTML =
            "Lokasi: " + latitude + "," + longitude;
    });
}

function kirimWA() {
    let nama = document.getElementById("nama").value;
    let absen = document.getElementById("absen").value;
    let makan = document.getElementById("makan").value;
    let mandi = document.getElementById("mandi").value;
    let alasan = document.getElementById("alasan").value;

    let text =
    "ABSEN PACAR 💖%0A" +
    "Nama: " + nama + "%0A" +
    "Absen: " + absen + "%0A" +
    "Makan: " + makan + "%0A" +
    "Mandi: " + mandi + "%0A" +
    "Alasan: " + alasan + "%0A" +
    "GPS: https://maps.google.com/?q=" + latitude + "," + longitude;

    let nomor = "6283136242383"; // ganti nomor
    window.open("https://wa.me/" + nomor + "?text=" + text, "_blank");
}
</script>

</body>
</html>
