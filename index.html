<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Absen GPS</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding-top: 40px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 320px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, select {
            width: 95%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }
        .status {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Absen GPS</h2>

    <input type="text" id="nama" placeholder="Nama"><br>
    <input type="text" id="kelas" placeholder="Kelas"><br>

    <select id="waktuAbsen">
        <option value="">Pilih Waktu Absen</option>
        <option value="Pagi">Pagi</option>
        <option value="Siang">Siang</option>
        <option value="Malam">Malam</option>
    </select><br>

    <p class="status" id="status">📍 Mengambil lokasi...</p>

    <button onclick="kirimWA()">Absen Sekarang</button>
</div>

<script>
function kirimWA() {
    var nama = document.getElementById("nama").value;
    var kelas = document.getElementById("kelas").value;
    var waktuAbsen = document.getElementById("waktuAbsen").value;

    if(nama === "" || kelas === "" || waktuAbsen === "") {
        alert("Isi semua data!");
        return;
    }

    document.getElementById("status").innerHTML = "⏳ Mengambil lokasi...";

    navigator.geolocation.getCurrentPosition(function(position) {

        var latitude = position.coords.latitude;
        var longitude = position.coords.longitude;

        document.getElementById("status").innerHTML = "✅ Lokasi berhasil didapat";

        var nomor = "6283136242382"; // GANTI NOMOR

        var waktu = new Date().toLocaleString();

        var maps = `https://maps.google.com/?q=${latitude},${longitude}`;

        var pesan = `📌 ABSEN GPS

Nama: ${nama}
Kelas: ${kelas}
Absen: ${waktuAbsen}
Waktu: ${waktu}
Lokasi: ${maps}
Status: Hadir`;

        var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

        window.open(url, "_blank");

    }, function() {
        document.getElementById("status").innerHTML = "❌ Gagal ambil lokasi";
        alert("Aktifkan GPS dulu!");
    });
}
</script>

</body>
</html>
