<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absen Pacar 💖</title>

<style>
body {
    font-family: Arial;
    background: #ffd6e0;
    padding: 15px;
}
.container {
    max-width: 400px;
    margin: auto;
}
h2 {
    text-align: center;
    color: #ff4d88;
}
.box {
    background: #fff0f5;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
select, input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ff99bb;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #ff4d88;
    color: white;
    font-size: 16px;
}
#lokasi {
    text-align: center;
    color: #ff4d88;
}
</style>
</head>

<body>

<div class="container">
<h2>Absen Pacar 💖</h2>

<div class="box">
Nama:
<input type="text" id="nama">
</div>

<div class="box">
Absen:
<select id="absen">
<option>Pagi</option>
<option>Siang</option>
<option>Malam</option>
</select>
</div>

<div class="box">
Makan:
<select id="makan">
<option>Nasi</option>
<option>Mie</option>
<option>Ayam</option>
<option>Roti</option>
<option>Tidak makan</option>
</select>
</div>

<div class="box">
Mandi:
<select id="mandi">
<option>Sudah</option>
<option>Belum</option>
</select>
</div>

<div class="box">
Alasan keluar:
<input type="text" id="alasan">
</div>

<button onclick="getLocation()">📍 Ambil GPS</button>
<p id="lokasi">Belum ambil lokasi</p>

<button onclick="kirimWA()">💌 Kirim ke WhatsApp</button>

</div>

<script>
let latitude = "";
let longitude = "";

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            latitude = pos.coords.latitude;
            longitude = pos.coords.longitude;
            document.getElementById("lokasi").innerHTML =
                "Lokasi: " + latitude + "," + longitude;
        });
    } else {
        alert("GPS tidak didukung");
    }
}

function kirimWA() {
    let nama = document.getElementById("nama").value;
    let absen = document.getElementById("absen").value;
    let makan = document.getElementById("makan").value;
    let mandi = document.getElementById("mandi").value;
    let alasan = document.getElementById("alasan").value;

    let text =
    "ABSEN PACAR 💖\n" +
    "Nama: " + nama + "\n" +
    "Absen: " + absen + "\n" +
    "Makan: " + makan + "\n" +
    "Mandi: " + mandi + "\n" +
    "Alasan: " + alasan + "\n" +
    "GPS: https://maps.google.com/?q=" + latitude + "," + longitude;

    let nomor = "6283136242383";

    let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(text);

    window.open(url, "_blank");
}
</script>

</body>
</html>
